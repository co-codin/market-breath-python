<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Market Breadth — Live Candles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f14;
        --panel: #111821;
        --fg: #d7dee6;
        --muted: #7e8a99;
        --border: #1e2733;
      }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg); font: 12px/1.4 system-ui, sans-serif; }
      body { display: flex; flex-direction: column; }

      header { padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .4px; }
      .pill { padding: 3px 8px; border-radius: 999px; background: #1a2431; color: var(--muted); font-size: 11px; }
      .pill.ok { color: #26a69a; }
      .pill.err { color: #ef5350; }
      .updated { margin-left: auto; color: var(--muted); font-size: 11px; }
      .updated b { color: var(--fg); font-weight: 600; }

      main { flex: 1 1 auto; min-height: 0; }
      #grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: minmax(220px, 1fr);
        gap: 1px;
        background: var(--border);
        width: 100%;
        height: 100%;
      }
      @media (max-width: 1200px) { #grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 720px)  { #grid { grid-template-columns: 1fr; } }

      .cell { background: var(--bg); position: relative; display: flex; flex-direction: column; overflow: hidden; }
      .cell .head {
        display: flex; align-items: baseline; gap: 6px;
        padding: 5px 10px;
        border-bottom: 1px solid var(--border);
        background: #0d131a;
      }
      .cell .head .sw { width: 9px; height: 9px; border-radius: 2px; flex: 0 0 auto; align-self: center; }
      .cell .head .name { font-weight: 600; letter-spacing: .3px; font-size: 12px; }
      .cell .head .last { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }
      .cell .head .date { margin-left: auto; color: var(--muted); font-size: 11px; }
      .cell .chart { flex: 1 1 auto; min-height: 0; }
    </style>
  </head>
  <body>
    <header>
      <h1>Market Breadth — % stocks above MA (daily)</h1>
      <span id="status" class="pill">loading…</span>
      <div class="updated">updated <b id="updated">—</b></div>
    </header>

    <main>
      <div id="grid"></div>
    </main>

    <script>
      const SYMBOLS = [
        { name: "$S5FD", color: "#26a69a" },
        { name: "$S5TW", color: "#4db6ac" },
        { name: "$S5FI", color: "#66bb6a" },
        { name: "$S5OH", color: "#9ccc65" },
        { name: "$S5TH", color: "#cddc39" },
        { name: "$NDFD", color: "#42a5f5" },
        { name: "$NDTW", color: "#5c6bc0" },
        { name: "$NDFI", color: "#7e57c2" },
        { name: "$NDOH", color: "#ab47bc" },
        { name: "$NDTH", color: "#ec407a" },
        { name: "$NCFD", color: "#ffa726" },
        { name: "$NCTW", color: "#ff7043" },
        { name: "$NCFI", color: "#ef5350" },
        { name: "$NCOH", color: "#f06292" },
        { name: "$NCTH", color: "#8d6e63" },
      ];

      const gridEl = document.getElementById("grid");
      const statusEl = document.getElementById("status");
      const updatedEl = document.getElementById("updated");
      const VISIBLE_BARS = 90;

      function hexToRgba(hex, a) {
        const n = parseInt(hex.slice(1), 16);
        return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${a})`;
      }

      function applyRange(sym) {
        if (!sym.barCount) return;
        const ts = sym.chart.timeScale();
        if (VISIBLE_BARS >= sym.barCount) ts.fitContent();
        else ts.setVisibleLogicalRange({ from: sym.barCount - VISIBLE_BARS, to: sym.barCount - 1 });
      }

      const symbols = SYMBOLS.map(s => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.innerHTML = `
          <div class="head">
            <span class="sw" style="background:${s.color}"></span>
            <span class="name">${s.name}</span>
            <span class="last">—</span>
            <span class="date">—</span>
          </div>
          <div class="chart"></div>`;
        gridEl.appendChild(cell);

        const chartEl = cell.querySelector(".chart");
        const chart = LightweightCharts.createChart(chartEl, {
          layout: { background: { color: "#0b0f14" }, textColor: "#d7dee6", fontSize: 10 },
          grid: { vertLines: { color: "#141c26" }, horzLines: { color: "#141c26" } },
          rightPriceScale: { borderColor: "#1e2733" },
          timeScale: { borderColor: "#1e2733", timeVisible: false, secondsVisible: false },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        });
        const series = chart.addCandlestickSeries({
          upColor: s.color, downColor: hexToRgba(s.color, 0.4),
          borderUpColor: s.color, borderDownColor: s.color,
          wickUpColor: s.color, wickDownColor: s.color,
          priceLineVisible: false, lastValueVisible: false,
        });
        const ro = new ResizeObserver(() => {
          chart.applyOptions({ width: chartEl.clientWidth, height: chartEl.clientHeight });
        });
        ro.observe(chartEl);

        return {
          name: s.name, chart, series,
          lastEl: cell.querySelector(".last"),
          dateEl: cell.querySelector(".date"),
          sig: "", barCount: 0,
        };
      });

      function parseCsv(text) {
        const bars = [];
        const seen = new Set();
        for (const raw of text.split(/\r?\n/)) {
          const line = raw.trim();
          if (!line) continue;
          const p = line.split(",");
          if (p.length < 6) continue;
          const date = p[1];
          if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;
          if (seen.has(date)) continue;
          seen.add(date);
          const o = +p[2], h = +p[3], l = +p[4], c = +p[5];
          if ([o, h, l, c].some(n => !Number.isFinite(n))) continue;
          bars.push({ time: date, open: o, high: h, low: l, close: c });
        }
        bars.sort((a, b) => a.time < b.time ? -1 : a.time > b.time ? 1 : 0);
        return bars;
      }

      function setStatus(kind, msg) {
        statusEl.className = "pill " + kind;
        statusEl.textContent = msg;
      }

      async function fetchOne(sym) {
        const url = "/api/data?symbol=" + encodeURIComponent(sym.name) + "&_=" + Date.now();
        const res = await fetch(url);
        if (!res.ok) throw new Error(sym.name + " HTTP " + res.status);
        const bars = parseCsv(await res.text());
        if (!bars.length) throw new Error(sym.name + " no bars");
        const last = bars[bars.length - 1];
        const sig = bars.length + "|" + last.time + "|" + last.close;
        if (sig !== sym.sig) {
          sym.series.setData(bars);
          sym.barCount = bars.length;
          applyRange(sym);
          sym.sig = sig;
          sym.lastEl.textContent = last.close.toFixed(1);
          sym.dateEl.textContent = last.time;
        }
      }

      async function tick() {
        const results = await Promise.allSettled(symbols.map(fetchOne));
        const failed = results.filter(r => r.status === "rejected");
        updatedEl.textContent = new Date().toLocaleTimeString();
        if (failed.length === 0) setStatus("ok", "live");
        else if (failed.length < symbols.length) setStatus("ok", `live (${failed.length} failed)`);
        else setStatus("err", "error: " + failed[0].reason.message);
      }

      tick();
      setInterval(tick, 5000);
    </script>
  </body>
</html>
