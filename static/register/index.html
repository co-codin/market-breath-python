<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Create account — Market Breadth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f14;
        --panel: #111821;
        --fg: #d7dee6;
        --muted: #7e8a99;
        --border: #1e2733;
        --accent: #42a5f5;
        --err: #ef5350;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--fg); font: 14px/1.5 system-ui, sans-serif; }
      body { display: flex; align-items: center; justify-content: center; padding: 24px; }
      form {
        width: 100%;
        max-width: 380px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      h1 { font-size: 20px; margin: 0 0 4px; font-weight: 600; letter-spacing: .2px; }
      p.sub { margin: 0 0 8px; color: var(--muted); font-size: 13px; }
      label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
      input {
        background: #0d131a;
        border: 1px solid var(--border);
        color: var(--fg);
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
        outline: none;
      }
      input:focus { border-color: var(--accent); }
      button {
        margin-top: 4px;
        padding: 10px 14px;
        background: var(--accent);
        color: #0b0f14;
        border: none;
        border-radius: 6px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: .6; cursor: not-allowed; }
      .err { color: var(--err); font-size: 12px; min-height: 16px; }
      .foot { margin-top: 4px; color: var(--muted); font-size: 13px; text-align: center; }
      .foot a { color: var(--accent); text-decoration: none; }
    </style>
  </head>
  <body>
    <form id="form">
      <h1>Create account</h1>
      <p class="sub">8-character minimum password.</p>
      <label>Email
        <input name="email" type="email" required autocomplete="email" />
      </label>
      <label>Password
        <input name="password" type="password" required minlength="8" autocomplete="new-password" />
      </label>
      <div class="err" id="err"></div>
      <button type="submit">Create account</button>
      <div class="foot">Already registered? <a href="/login/">Sign in</a></div>
    </form>

    <script>
      const form = document.getElementById("form");
      const errEl = document.getElementById("err");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errEl.textContent = "";
        const btn = form.querySelector("button");
        btn.disabled = true;
        const data = Object.fromEntries(new FormData(form));
        try {
          const res = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            errEl.textContent = body.detail || "Registration failed.";
            return;
          }
          location.href = "/breadth/";
        } catch (e) {
          errEl.textContent = "Network error.";
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
